# yaml-language-server: $schema=./extend.schema.json
- root:
    binds:
      - key: "C-e"
        table: "extend"
      - key: "M-C-n"
        action: 'run-shell "#{smart_session_switch} next"'
        description: "next session (skips DUMP)"
      - key: "M-C-p"
        action: 'run-shell "#{smart_session_switch} prev"'
        description: "previous session (skips DUMP)"
      - key: "M-C-h"
        action: "previous-window"
        description: "previous window"
      - key: "M-C-l"
        action: "next-window"
        description: "next window"
      - key: "M-C-f"
        type: "exec"
        action: "ls"
        description: "list files"
      - key: "M-C-o"
        type: "exec"
        action: "sudo !!"
        description: "sudo last command"
      - key: "C-M-d"
        type: "exec"
        action: "lsd"
        description: "list files with lsd"
        dependency: "lsd"
      - key: "C-t"
        action: 'display-popup -E "tf-tmux-fuzzy"'
        description: "fuzzy tmux switcher"
        dependency: "tf-tmux-fuzzy"
      - key: "C-M-z"
        action: "resize-pane -Z"
        description: "zoom pane"
      - key: "C-M-e"
        type: "exec"
        action: "vf-vim-fuzzy"
        description: "fuzzy vim file"
        dependency: "vf-vim-fuzzy"
      - key: "C-M-r"
        type: "exec"
        action: "rails console"
        description: "rails console"
        dependency: "rails"
      - key: "C-M-c"
        type: "exec"
        action: "clear"
        description: "clear terminal"
      - key: "C-M-b"
        action: "move-pane -t DUMP"
        description: "move pane to DUMP session"
- prefix:
    binds:
      - key: "("
        action: 'run-shell "#{smart_session_switch} prev"'
        description: "previous session (skips DUMP)"
      - key: ")"
        action: 'run-shell "#{smart_session_switch} next"'
        description: "next session (skips DUMP)"
- extend:
    binds:
      - key: "e"
        type: "send"
        action: "C-e"
        description: "end of line"
      - key: "c"
        action: "command-prompt"
        description: "command prompt"
      - key: "w"
        table: "windows"
        description: "windows mode"
      - key: "s"
        table: "sessions"
        description: "sessions mode"
      - key: "p"
        table: "project"
        description: "project mode"
      - key: "g"
        table: "globs"
        description: "globs mode"
      - key: "f"
        table: "files"
        description: "files mode"
      - key: "r"
        bundle: "bundles/rails.extend.yml"
        mount: false
        description: "rails mode"
      - key: "h"
        table: "all"
        description: "command palette"
- globs:
    modal: false
    binds:
      - key: "p"
        type: "exec"
        action: "git push"
        description: "git push"
        dependency: "git"
      - key: "l"
        type: "send"
        action: "*(om[1])"
        description: "glob for last modified"
- files:
    modal: false
    binds:
      - key: "c"
        type: "exec"
        action: "fzf-cd-widget"
        description: "cd folder"
      - key: "l"
        type: "exec"
        action: "ls"
        description: "list"
      - key: "t"
        type: "exec"
        action: "ranger"
        description: "file tree/explorer"
        dependency: "ranger"
- project:
    modal: false
    binds:
      - key: "f"
        type: "exec"
        action: "vf-vim-fuzzy"
        description: "open file in current project"
        dependency: "vf-vim-fuzzy"
- sessions:
    modal: true
    binds:
      - key: "l"
        action: 'run-shell "#{smart_session_switch} next"'
        description: "next session (skips DUMP)"
      - key: "h"
        action: 'run-shell "#{smart_session_switch} prev"'
        description: "previous session (skips DUMP)"
      - key: "s"
        action: "switch-client -l"
        description: "last session"
      - key: "n"
        description: "create a new session"
        action: 'command-prompt -p "session name: " "new-session -s %1"'
      - key: "d"
        action: "switch-client -t DUMP"
        description: "switch to DUMP"
- windows:
    modal: true
    binds:
      - key: "c"
        type: "exec"
        action: "clear"
        description: "clear terminal"
      - key: "R"
        table: "resize"
        description: "resize mode"
      - key: "r"
        action: 'command-prompt -p "window name: " "rename-window %1"'
        description: "manual rename"
      - key: "="
        action: "select-layout even-vertical"
        description: "equalize windows"
      - key: "/"
        action: "split-window -h"
        description: "split horizontal"
      - key: "^-"
        action: "split-window -vb"
        description: "split vertical (above)"
      - key: "-"
        action: "split-window -v"
        description: "split vertical"
      - key: "d"
        action: "kill-pane"
        description: "kill pane"
      - key: "h"
        action: "select-pane -L"
        description: "move left"
      - key: "l"
        action: "select-pane -R"
        description: "move right"
      - key: "H"
        action: "swap-window -t - -d"
        description: "swap window left"
      - key: "L"
        action: "swap-window -t + -d"
        description: "swap window right"
      - key: "j"
        action: "select-pane -D"
        description: "move down"
      - key: "k"
        action: "select-pane -U"
        description: "move up"
      - key: "J"
        action: "swap-pane -t + -d"
        description: "swap pane down"
      - key: "K"
        action: "swap-pane -t - -d"
        description: "swap pane up"
      - key: "b"
        action: "move-pane -t DUMP"
        description: "move to DUMP"
      - key: "m"
        action: 'display-popup -E "tmux list-sessions -F \"#S\" | grep -v \"^$(tmux display-message -p \"#S\")$\" | fzf --reverse --header=\"Move window to session\" | xargs -I{} tmux move-window -t {}"'
        description: "move window to session"
      - key: "p"
        table: "panes"
        description: "pane swapping mode"
      - key: "n"
        action: 'rename-window "#{b:pane_current_path}"'
        description: "rename window to PWD"
- panes:
    modal: true
    binds:
      - key: "h"
        action: "swap-pane -d -s '{left-of}'"
        description: "swap pane left"
      - key: "l"
        action: "swap-pane -d -s '{right-of}'"
        description: "swap pane right"
      - key: "j"
        action: "swap-pane -d -s '{down-of}'"
        description: "swap pane down"
      - key: "k"
        action: "swap-pane -d -s '{up-of}'"
        description: "swap pane up"
- resize:
    modal: true
    binds:
      - key: "h"
        action: "resize-pane -L"
        description: "resize left"
      - key: "l"
        action: "resize-pane -R"
        description: "resize right"
      - key: "j"
        action: "resize-pane -D"
        description: "resize down"
      - key: "k"
        action: "resize-pane -U"
        description: "resize up"
